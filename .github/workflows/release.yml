name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15
            name: darwin-arm64
            platform: darwin
            arch: arm64
          - runner: macos-13
            name: darwin-x64
            platform: darwin
            arch: x64
          - runner: ubuntu-24.04
            name: linux-x64
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            name: linux-arm64
            platform: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install JS dependencies
        run: bun install

      - name: Build native addon
        run: bun --cwd=packages/natives run build
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Build binary
        run: bun --cwd=packages/coding-agent run build
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Rename binary
        run: mv packages/coding-agent/dist/omap "omp-${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-${{ matrix.platform }}-${{ matrix.arch }}
          path: omp-${{ matrix.platform }}-${{ matrix.arch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: binaries/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
